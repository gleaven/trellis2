services:
  trellis2:
    build: .
    container_name: demo-trellis2
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - TORCH_CUDA_ARCH_LIST=${TORCH_CUDA_ARCH_LIST:-12.1}
      - ATTN_BACKEND=sdpa
      - GRADIO_ROOT_PATH=${GRADIO_ROOT_PATH:-/trellis2/gradio}
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - HF_HOME=/workspace/cache/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
      - TRITON_CACHE_DIR=/workspace/cache/triton
      - TORCH_HOME=/workspace/cache/torch
      - TRITON_PTXAS_PATH=/usr/local/cuda/bin/ptxas
      - GALLERY_DIR=/app/gallery
      # Optional ServiceRouter integration. Leave default; the app no-ops
      # GPU-stats lookups when the URL isn't reachable.
      - SERVICEROUTER_URL=${SERVICEROUTER_URL:-http://demo-servicerouter:8080}
    volumes:
      - trellis2-hf-cache:/workspace/cache/huggingface
      - trellis2-triton-cache:/workspace/cache/triton
      - trellis2-torch-cache:/workspace/cache/torch
      - trellis2-gallery:/app/gallery
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Optional HTTPS reverse proxy (--profile proxy).
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    container_name: trellis2-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8081}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - trellis2-caddy-data:/data
      - trellis2-caddy-config:/config
    depends_on:
      - trellis2

volumes:
  trellis2-hf-cache:
  trellis2-triton-cache:
  trellis2-torch-cache:
  trellis2-gallery:
  trellis2-caddy-data:
  trellis2-caddy-config:
